# Serves the static dashboard and proxies the API to the Spring Boot gateway, so the browser
# sees a single origin and api.js can keep its relative API_BASE. This is the seam where, in
# production, you'd terminate TLS and add rate limiting.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Everything under /api goes to the gateway (which caches and fans out to compute).
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 150s;   # cold criticality runs are slow; don't cut them off
    }
}
